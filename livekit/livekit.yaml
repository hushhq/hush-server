# LiveKit Server Configuration
# Keys and webhook api_key are injected from env vars at container startup.
# See docker-compose.yml entrypoint.

port: 7880

rtc:
  # Must match docker-compose published range so host browser can reach ICE candidates
  port_range_start: 50020
  port_range_end: 50100
  tcp_port: 7881
  use_external_ip: false
  node_ip: __NODE_IP__

keys:
  __LIVEKIT_API_KEY__: __LIVEKIT_API_SECRET__

room:
  auto_create: true
  empty_timeout: 0
  enabled_codecs:
    - mime: audio/opus
    - mime: video/h264
    - mime: video/vp8
    - mime: video/vp9

webhook:
  urls:
    - http://hush-api:8080/api/livekit/webhook
  api_key: __LIVEKIT_API_KEY__

logging:
  level: info
