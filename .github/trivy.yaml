# Trivy configuration for HUSHHQ-82 release-tag scans.
#
# CI gates publication on HIGH/CRITICAL findings (exit-code 1) and
# instructs trivy to ignore unfixed CVEs (advisories with no upstream
# patch yet); a finding is only blocking when there is a fix available
# that we could ship.
#
# Per-CVE exceptions (when a patch IS available but consciously deferred)
# must go in the `vulnerability.ignored` list below with:
#   - the CVE id,
#   - the reason for the exception,
#   - an expiry date (YYYY-MM-DD) by which the exception must be revisited.
#
# Each entry is reviewed in the PR that adds it.

vulnerability:
  type:
    - os
    - library
  ignore-unfixed: true
  # ── HUSHHQ-82 fork-only validation allow-list ───────────────────
  # The 5 CVEs below were detected on the fork's `v0.99.0` test build
  # and exist on the canonical `hush-server` main as well. They are
  # excluded here ONLY so the rest of the HUSHHQ-82 release pipeline
  # (multi-arch push, cosign signing, SBOM attestation) can be
  # validated end-to-end on the fork. **REMOVE THIS BLOCK BEFORE
  # MERGING TO hushhq/hush-server main.** Real remediation is tracked
  # as a follow-up dependency-bump ticket; this allow-list must not
  # ship to the production release pipeline.
  ignored:
    - id: CVE-2026-40200
      # reason: alpine 3.19 musl; fix lands in alpine 3.20+. Real fix
      # = base image bump in a follow-up ticket.
      expires: 2026-06-04
    - id: CVE-2026-34986
      # reason: go-jose/v3 v3.0.4 → v3.0.5. Real fix = `go get -u` in
      # a follow-up ticket.
      expires: 2026-06-04
    - id: CVE-2026-33816
      # reason: jackc/pgx/v5 v5.8.0 → v5.9.0. Real fix in follow-up.
      expires: 2026-06-04
    - id: CVE-2026-29181
      # reason: opentelemetry v1.39.0 → v1.41.0. Real fix in follow-up.
      expires: 2026-06-04
    - id: CVE-2026-33186
      # reason: grpc v1.78.0 → v1.79.3. Real fix in follow-up.
      expires: 2026-06-04

severity:
  - HIGH
  - CRITICAL
