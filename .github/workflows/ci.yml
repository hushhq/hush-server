name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hush
          POSTGRES_PASSWORD: hush
          POSTGRES_DB: hush_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://hush:hush@localhost:5432/hush_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json
      - run: cd admin && npm ci && npm run build
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test ./...

  # HUSHHQ-82: multi-arch publish on every `v*` tag with cosign signature,
  # SPDX SBOM attestation, and pre-push audit gate (trivy + private-path
  # find). Only `vX.Y.Z` is published — moving aliases (`vX.Y`, `vX`,
  # `latest`, `nightly`) are deferred to HUSHHQ-84.
  docker:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
      # Required for cosign keyless OIDC signing.
      id-token: write
    env:
      IMAGE: ghcr.io/hushhq/hush-server
      # Resolve the build version from the tag ref once, here, so every
      # downstream step receives it as a plain env variable rather than
      # interpolating `${{ github.ref_name }}` inside a run: block.
      BUILD_VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Emit exactly one image tag for HUSHHQ-82: `vX.Y.Z`. No moving
      # aliases. `flavor: latest=false` explicitly suppresses the default
      # `latest` that docker/metadata-action would otherwise add.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}

      # Scan stage: build a single-arch local image so trivy + the
      # private-path audit can inspect it BEFORE we push anything.
      # cache-from/cache-to is reused by the publish stage below.
      - id: build-scan
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          tags: hush-server:scan
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Vulnerability scan (block on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hush-server:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivy-config: .github/trivy.yaml

      # Public/Private boundary gate per CLAUDE.md: the published image
      # must never contain private ops directories. This step fails the
      # build if any of those names appear anywhere in the image fs.
      - name: Audit image for private ops paths
        run: |
          set -euo pipefail
          leaked=$(docker run --rm --entrypoint sh hush-server:scan -c \
            'find / -type d \( -name "hush-ops" -o -name ".private" -o -name "internal-ops" \) 2>/dev/null' \
            || true)
          if [ -n "$leaked" ]; then
            echo "::error::private namespace directories leaked into image:"
            printf '%s\n' "$leaked"
            exit 1
          fi

      # Publish stage: multi-arch push using the same GHA cache. The
      # digest output is what we sign with cosign — signing by tag would
      # be racy.
      - id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Cosign keyless OIDC signing. The certificate identity recorded
      # by the transparency log is the workflow path + tag ref, which
      # `scripts/verify-release.sh` checks against on the self-hoster
      # side.
      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      # SPDX SBOM attached as an OCI attestation. Self-hosters retrieve
      # it via `cosign download attestation` if they want to inspect the
      # software bill of materials before deploying.
      - id: sbom
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Attest SBOM
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdx \
            "${IMAGE}@${DIGEST}"
