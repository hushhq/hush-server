# Production deployment - generated by scripts/setup.sh
# Self-contained compose for self-hosters. Requires a populated .env (run setup.sh first).
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  hush-web:
    build:
      context: ../hush-web
      dockerfile: Dockerfile
      args:
        VITE_DEBUG_TOOLBAR: ${VITE_DEBUG_TOOLBAR:-true}
    image: hush-web:local
    container_name: hush-web
    ports:
      - "127.0.0.1:8090:80"
    restart: unless-stopped
    networks:
      - hush-network

  postgres:
    image: postgres:16-alpine
    container_name: hush-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-hush}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-hush}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hush}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hush-network

  redis:
    image: redis:7-alpine
    container_name: hush-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hush-network

  hush-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hush-api:local
    container_name: hush-api
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER:-hush}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hush}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - DOMAIN=${DOMAIN}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_URL=wss://${DOMAIN}/livekit
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - TRANSPARENCY_LOG_PRIVATE_KEY=${TRANSPARENCY_LOG_PRIVATE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - hush-network

  livekit:
    image: livekit/livekit-server:latest
    container_name: hush-livekit
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sed -e "s/__LIVEKIT_API_KEY__/$$LIVEKIT_API_KEY/g" \
            -e "s/__LIVEKIT_API_SECRET__/$$LIVEKIT_API_SECRET/g" \
            -e "s/__NODE_IP__/$$NODE_IP/g" \
            /etc/livekit.yaml.tmpl > /tmp/livekit.yaml
        exec /livekit-server --config /tmp/livekit.yaml
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - NODE_IP=${NODE_IP:-}
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml.tmpl:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50020-50100:50020-50100/udp"
    restart: unless-stopped
    networks:
      - hush-network

networks:
  hush-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
