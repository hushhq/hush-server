# Production backend/media stack for self-hosters.
# Requires a populated .env (run scripts/setup.sh first).
# This file does NOT bundle hush-web; use the default Caddy override or your
# own reverse proxy in front of the API and LiveKit endpoints.
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: hush-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-hush}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-hush}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hush}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hush-network

  redis:
    image: redis:7-alpine
    container_name: hush-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hush-network

  # MinIO is the self-host S3-compatible backend for the device-link bulk
  # transfer plane. The API uses it via `STORAGE_BACKEND=s3`; chunks
  # never traverse the API process for upload/download — the browser
  # PUTs/GETs presigned URLs directly.
  #
  # Public reachability: domain-mode self-hosters expose MinIO via
  # Caddy on `storage.${DOMAIN}` (TLS via Let's Encrypt, see Caddy
  # template). The internal listener (port 9000 in the compose
  # network) is what Caddy reverse-proxies; we do NOT publish 9000 on
  # the host to keep the surface narrow.
  #
  # IP-mode self-hosters cannot use this MinIO out of the box because
  # the browser presigned URLs need a routable, browser-trusted
  # hostname that matches the API's signing host. Use external S3
  # (AWS/etc.) instead — see RUNBOOK.md.
  minio:
    image: quay.io/minio/minio:RELEASE.2024-09-22T00-33-43Z
    container_name: hush-minio
    profiles: ["s3-storage"]
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      # MINIO_SERVER_URL teaches MinIO its own externally-visible URL
      # so that presigned-URL signatures it validates match the host
      # the browser actually hit. Set to https://storage.${DOMAIN}
      # by setup.sh in domain mode; left blank in IP mode (operator
      # must point STORAGE_S3_ENDPOINT at an external S3 bucket).
      - MINIO_SERVER_URL=${MINIO_SERVER_URL:-}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - hush-network

  # One-shot: creates the bucket and applies the CORS policy required
  # by the browser client. Idempotent — `mc mb` reports an OK no-op
  # if the bucket already exists; `mc cors set` overwrites the policy
  # in place.
  minio-bootstrap:
    image: quay.io/minio/mc:RELEASE.2024-09-16T17-43-14Z
    container_name: hush-minio-bootstrap
    profiles: ["s3-storage"]
    depends_on:
      minio:
        condition: service_started
    entrypoint: /bin/sh
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET:-hush-link-archive}
      - STORAGE_BROWSER_ORIGIN=${STORAGE_BROWSER_ORIGIN:-https://app.gethush.live}
    command:
      - -c
      - |
        set -eu
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
          sleep 2
        done
        if ! mc ls "local/$$STORAGE_S3_BUCKET" >/dev/null 2>&1; then
          mc mb "local/$$STORAGE_S3_BUCKET"
        fi
        # CORS policy: the browser client (origin from STORAGE_BROWSER_ORIGIN)
        # PUTs and GETs ciphertext directly to the bucket, declaring the
        # SHA-256 via x-amz-checksum-sha256 and verifying the same
        # header on download.
        cat >/tmp/cors.xml <<XML
        <CORSConfiguration>
          <CORSRule>
            <AllowedOrigin>$$STORAGE_BROWSER_ORIGIN</AllowedOrigin>
            <AllowedMethod>GET</AllowedMethod>
            <AllowedMethod>PUT</AllowedMethod>
            <AllowedMethod>HEAD</AllowedMethod>
            <AllowedHeader>Content-Type</AllowedHeader>
            <AllowedHeader>x-amz-checksum-sha256</AllowedHeader>
            <AllowedHeader>x-amz-content-sha256</AllowedHeader>
            <AllowedHeader>x-amz-date</AllowedHeader>
            <AllowedHeader>authorization</AllowedHeader>
            <ExposeHeader>ETag</ExposeHeader>
            <ExposeHeader>x-amz-checksum-sha256</ExposeHeader>
            <MaxAgeSeconds>3000</MaxAgeSeconds>
          </CORSRule>
        </CORSConfiguration>
        XML
        mc cors set "local/$$STORAGE_S3_BUCKET" /tmp/cors.xml
        echo "minio-bootstrap: bucket $$STORAGE_S3_BUCKET ready, CORS allowed origin $$STORAGE_BROWSER_ORIGIN"
    restart: "no"
    networks:
      - hush-network

  hush-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hush-api:local
    container_name: hush-api
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER:-hush}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hush}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - DOMAIN=${DOMAIN}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - LIVEKIT_URL=wss://${DOMAIN}/livekit
      - TRANSPARENCY_LOG_PRIVATE_KEY=${TRANSPARENCY_LOG_PRIVATE_KEY}
      # Storage backend for the device-link bulk transfer plane.
      # Defaults to postgres_bytea so a self-host without S3 still works
      # for small accounts; setup.sh sets STORAGE_BACKEND=s3 + the
      # STORAGE_S3_* vars when MinIO is wired up.
      - STORAGE_BACKEND=${STORAGE_BACKEND:-postgres_bytea}
      - STORAGE_S3_ENDPOINT=${STORAGE_S3_ENDPOINT:-}
      - STORAGE_S3_REGION=${STORAGE_S3_REGION:-us-east-1}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET:-hush-link-archive}
      - STORAGE_S3_ACCESS_KEY=${STORAGE_S3_ACCESS_KEY:-}
      - STORAGE_S3_SECRET_KEY=${STORAGE_S3_SECRET_KEY:-}
      - STORAGE_S3_USE_SSL=${STORAGE_S3_USE_SSL:-true}
      - LINK_ARCHIVE_USER_QUOTA=${LINK_ARCHIVE_USER_QUOTA:-1}
      - LINK_ARCHIVE_STAGING_BYTES_CAP=${LINK_ARCHIVE_STAGING_BYTES_CAP:-8589934592}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - hush-network

  livekit:
    image: livekit/livekit-server:v1.10.1
    container_name: hush-livekit
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sed -e "s/__LIVEKIT_API_KEY__/$$LIVEKIT_API_KEY/g" \
            -e "s/__LIVEKIT_API_SECRET__/$$LIVEKIT_API_SECRET/g" \
            -e "s/__NODE_IP__/$$NODE_IP/g" \
            /etc/livekit.yaml.tmpl > /tmp/livekit.yaml
        exec /livekit-server --config /tmp/livekit.yaml
    environment:
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - NODE_IP=${NODE_IP:-}
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml.tmpl:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50020-50100:50020-50100/udp"
    restart: unless-stopped
    networks:
      - hush-network

networks:
  hush-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
