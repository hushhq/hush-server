# Nginx reverse proxy config for the Hush backend/media plane.
# For self-hosters running nginx alongside other services.
#
# This config uses 127.0.0.1 ports because nginx typically runs on the
# host alongside Docker containers with port-mapped services. If your
# Docker services are on a custom network, replace 127.0.0.1 with the
# appropriate container names or network addresses.
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/hush.conf
#   2. Replace YOUR_DOMAIN with your actual domain
#   3. ln -s /etc/nginx/sites-available/hush.conf /etc/nginx/sites-enabled/
#   4. Obtain TLS certs (e.g. certbot --nginx -d YOUR_DOMAIN)
#   5. nginx -t && systemctl reload nginx
#
# Notes:
#   - This template exposes the API, WebSocket, LiveKit signaling, and admin dashboard paths.
#   - The admin dashboard is embedded in the Go binary and served at /admin/.
#   - hush-server does not bundle hush-web; serve the browser client separately
#     if you want a same-origin UI on this domain.

upstream hush_api {
    server 127.0.0.1:8080;
}

upstream hush_livekit {
    server 127.0.0.1:7880;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # TLS - managed by certbot or your own certs
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; connect-src 'self' https: http: wss: ws:; img-src 'self' data:; style-src 'self' 'unsafe-inline'" always;

    # LiveKit WebSocket signaling
    location /livekit/ {
        rewrite ^/livekit/(.*) /$1 break;
        proxy_pass http://hush_livekit;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Go API
    location /api/ {
        proxy_pass http://hush_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Go WebSocket
    location /ws {
        proxy_pass http://hush_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Admin dashboard (embedded in Go binary)
    location /admin {
        proxy_pass http://hush_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Informational fallback for browser visits.
    location / {
        default_type text/plain;
        return 200 "Hush instance backend is live. Use a compatible Hush web client and connect to this instance URL, or visit /admin/ for the instance admin dashboard.\n";
    }
}
